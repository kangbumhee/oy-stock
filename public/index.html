<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>올리브영 재고 확인</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>🫒 올리브영 매장 재고</h1>
      <div id="header-meta">
        <span id="current-location">📍 위치 확인중...</span>
        <button type="button" data-action="detectLocation" style="font-size:11px;padding:2px 8px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;margin-left:4px">📍 현재위치</button>
        <select id="region-select" aria-label="지역"></select>
      </div>
      <div id="cache-info" class="cache-info"></div>
    </header>

    <nav class="tabs">
      <button type="button" class="main-tab active" data-tab="search" data-action="tabSearch">🔍 검색</button>
      <button type="button" class="main-tab" data-tab="favorites" data-action="tabFavorites">⭐ 즐겨찾기 <span id="fav-count" class="fav-count"></span></button>
      <button type="button" class="main-tab" data-action="showHistory">📋 즐겨찾기 이력</button>
    </nav>

    <div id="sync-status" class="sync-status" style="display:none"></div>

    <main id="search-section">
      <form id="search-form">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="상품명 검색 (예: 선크림, 토너)" autocomplete="off">
          <button type="submit">검색</button>
        </div>
      </form>
      <div id="search-history"></div>
      <div id="popular-keywords" aria-label="인기 검색어"></div>
      <div id="product-list">
        <div class="empty-state">
          <p>상품명을 검색하거나 ⭐ 즐겨찾기에서 확인하세요</p>
          <p class="sub">매장·온라인 재고는 위치 기준으로 실시간 조회됩니다</p>
        </div>
      </div>
    </main>

    <section id="fav-section" style="display:none">
      <div id="fav-list"></div>
    </section>

    <div id="popup-root"></div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/storage.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/options.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/regions.js"></script>
  <script src="/js/inventory.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      Regions.renderSelector();
      Search.renderPopularKeywords();
    });
  </script>
</body>
</html>
