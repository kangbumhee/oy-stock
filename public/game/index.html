    if(catOnly){
    genres.forEach(function(gn){
      var arr=byCat[c][gn];
      if(hideSmall&&arr.length<SECTION_TOP)return;
      var pool=arr.slice().sort(function(x,y){return (y.dl||0)-(x.dl||0);}).slice(0,100);
      for(var _i=pool.length-1;_i>0;_i--){var _j=Math.floor(Math.random()*(_i+1));var _t=pool[_i];pool[_i]=pool[_j];pool[_j]=_t;}
      var top=pool.slice(0,SECTION_TOP);
      total+=top.length;
      var gname=(gn==="__none__")?"Unclassified":esc(gn);
      inner+='<div class="genre-block"><h3 class="genre-title">'+gname+' <span class="num">'+arr.length+'</span></h3><div class="grid '+CARD_CLASS+'">'+top.map(cardHtml).join("")+'</div></div>';
    });
    }
    if(!inner)return;
    html+='<section class="platform-section"><h2 class="platform-title" style="--pc:'+catColor(c)+'">'+esc(catShort(c))+' <span class="ps-count">'+catCount+'</span></h2>'+inner+'</section>';
  });
  grid.className="";grid.innerHTML=html;_resetMore();
  visibleCount.textContent=total;empty.style.display=total?"none":"block";
}
function renderFavSections(catOnly){
  var byCat={};
  GAMES.forEach(function(g){if(!favs.has(g.id))return;var c=g.category||"other";if(catOnly&&c!==catOnly)return;if(!byCat[c])byCat[c]=[];byCat[c].push(g);});
  var cats=Object.keys(byCat).sort(function(a,b){return catOrder(a)-catOrder(b);});
  var html="",total=0;
  cats.forEach(function(c){
    var arr=byCat[c].slice().sort(function(x,y){return (y.dl||0)-(x.dl||0);});
    total+=arr.length;
    html+='<section class="platform-section"><h2 class="platform-title" style="--pc:'+catColor(c)+'">\u2b50 '+esc(catShort(c))+' <span class="ps-count">'+arr.length+'</span></h2><div class="grid '+CARD_CLASS+'">'+arr.map(cardHtml).join("")+'</div></section>';
  });
  grid.className="";grid.innerHTML=html;_resetMore();
  visibleCount.textContent=total;empty.style.display=total?"none":"block";
}
function applyFilter(){
  syncListUrl();
  if(favOnly&&!currentGenre&&!filter.value.trim()){renderFavSections(currentCat==="all"?null:currentCat);restoreScrollSoon();return;}
  if(isSectionMode()){renderSections(currentCat==="all"?null:currentCat);restoreScrollSoon();return;}
  var q=filter.value.toLowerCase().trim();
  var items=GAMES.filter(function(g){
    if(favOnly&&!favs.has(g.id))return false;
    if(currentCat!=="all"&&(g.category||"other")!==currentCat)return false;
    if(currentGenre){if(currentGenre==="__unclassified__"){if(g.genre)return false;}else if((g.genre||"")!==currentGenre)return false;}
    if(q){return g.title.toLowerCase().indexOf(q)>=0;}
    return true;
  });
  items=items.slice();
  if(sortMode==="name")items.sort(function(x,y){return x.title.localeCompare(y.title);});
  else if(sortMode==="year")items.sort(function(x,y){return (parseInt(x.year)||0)-(parseInt(y.year)||0);});
  else if(sortMode==="popular")items.sort(function(x,y){return (y.dl||0)-(x.dl||0);});
  else if(sortMode==="random")items.sort(function(){return Math.random()-0.5;});
  render(items);restoreScrollSoon();
}
var PAGE_SIZE=60,_pageItems=[],_pageShown=0;
function render(items){
  grid.className="grid "+CARD_CLASS;
  visibleCount.textContent=items.length;
  empty.style.display=items.length?"none":"block";
  _pageItems=items;_pageShown=0;grid.innerHTML="";
  renderMore();
}
function renderMore(){
  var mb=document.getElementById("more");
  if(_pageShown>=_pageItems.length){if(mb)mb.style.display="none";return;}
  var next=_pageItems.slice(_pageShown,_pageShown+PAGE_SIZE);
  _pageShown+=next.length;
  grid.insertAdjacentHTML("beforeend",next.map(cardHtml).join(""));
  if(mb)mb.style.display=(_pageShown<_pageItems.length)?"block":"none";
}
function _resetMore(){_pageItems=[];_pageShown=0;var mb=document.getElementById("more");if(mb)mb.style.display="none";}
function renderRecent(){
  var rr=document.getElementById("recentRow");var items=loadArr(REC_KEY).map(byId).filter(Boolean);
  if(!items.length){rr.style.display="none";rr.innerHTML="";return;}
  rr.style.display="block";
  rr.innerHTML='<div class="recent-title">'+t("recent")+'</div><div class="recent-items">'+items.map(function(g){return '<a href="'+playHref(g)+'"><img loading="lazy" src="https://archive.org/services/img/'+g.id+'" onerror="this.src=\''+FALLBACK+'\'">'+esc(g.title)+'</a>';}).join("")+'</div>';
}
grid.addEventListener("click",function(e){
  var fb=e.target.closest?e.target.closest(".fav-btn"):null;
  if(fb){e.preventDefault();var id=fb.dataset.fav;toggleFav(id);fb.classList.toggle("on");fb.textContent=favs.has(id)?"★":"☆";if(favOnly){applyFilter();}return;}
  var card=e.target.closest?e.target.closest("a.card"):null;
  if(card){saveListState();try{var id=new URL(card.href,location.href).searchParams.get("game");if(id)recordRecent(id);}catch(x){}}
});
filter.addEventListener("input",applyFilter);
var _moreEl=document.getElementById("more");
if(_moreEl){if("IntersectionObserver" in window){new IntersectionObserver(function(es){for(var i=0;i<es.length;i++){if(es[i].isIntersecting){renderMore();}}},{rootMargin:"800px"}).observe(_moreEl);}_moreEl.addEventListener("click",renderMore);}
document.getElementById("favOnly").addEventListener("click",function(){favOnly=!favOnly;this.classList.toggle("on",favOnly);this.setAttribute("aria-pressed",favOnly?"true":"false");this.textContent=(favOnly?"★":"☆")+" "+t("fav");applyFilter();});
function goHome(){currentCat="all";currentGenre="";favOnly=false;if(filter)filter.value="";
  var fo=document.getElementById("favOnly");if(fo){fo.classList.remove("on");fo.setAttribute("aria-pressed","false");fo.textContent="\u2606 "+t("fav");}
  if(sidebar){sidebar.querySelectorAll(".plat-head,.genre-item").forEach(function(x){x.classList.remove("active");});sidebar.querySelectorAll(".plat-group").forEach(function(x){x.classList.remove("open");});var sa=sidebar.querySelector(".side-all");if(sa)sa.classList.add("active");}
  applyFilter();try{window.scrollTo(0,0);}catch(e){}}
var _hh=document.getElementById("siteHome");if(_hh)_hh.addEventListener("click",goHome);
var _hl=document.getElementById("siteLogoLink");if(_hl)_hl.addEventListener("click",goHome);
function renderDaily(){
  var el=document.getElementById("daily");if(!SHOW_DAILY||!GAMES.length){el.style.display="none";return;}
  var d=new Date();var seed=d.getFullYear()*1000+(d.getMonth()*31+d.getDate());var g=GAMES[seed%GAMES.length];
  el.innerHTML='<a class="daily" href="'+playHref(g)+'"><img loading="lazy" src="https://archive.org/services/img/'+g.id+'" onerror="this.src=\''+FALLBACK+'\'"><div><div class="dl-tag">'+t("daily")+'</div><div class="dl-title">'+esc(g.title)+'</div><div class="dl-meta">'+(g.year||"????")+(g.genre?" · "+esc(g.genre):"")+'</div></div></a>';
  el.querySelector("a").addEventListener("click",function(){saveListState();recordRecent(g.id);});
}
function applyLang(){
  filter.placeholder=t("search");
  var fo=document.getElementById("favOnly");if(fo){fo.textContent=(favOnly?"★":"☆")+" "+t("fav");fo.classList.toggle("on",favOnly);fo.setAttribute("aria-pressed",favOnly?"true":"false");}
  var gl=document.getElementById("gamesLabel");if(gl)gl.textContent=t("games");
  var pl=document.getElementById("poweredLabel");if(pl)pl.textContent=t("powered");
  empty.textContent=t("empty");
  document.documentElement.lang=LANG;
  buildSidebar();renderRecent();renderDaily();applyFilter();
}
restoreListState();
document.getElementById("langSel").value=LANG;
document.getElementById("langSel").addEventListener("change",function(e){LANG=e.target.value;localStorage.setItem("red_lang_"+location.pathname,LANG);applyLang();});
applyLang();
window.addEventListener("pagehide",saveListState);
window.addEventListener("pageshow",function(){queueScrollRestoreFromUrl();});
if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}
</script>
