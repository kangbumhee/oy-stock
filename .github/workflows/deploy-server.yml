name: Deploy Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          cd server
          gcloud run deploy oy-stock-api \
            --source . \
            --region asia-northeast3 \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --timeout 120 \
            --cpu-throttling \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Health Check
        run: |
          sleep 30
          curl -f https://oy-stock-api-3596046881.asia-northeast3.run.app/health || echo "Health check failed"
