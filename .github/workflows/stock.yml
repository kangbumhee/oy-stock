name: OliveYoung Stock

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - run: node scripts/detail-stock.mjs

      - name: Generate curator links
        env:
          OY_CURATOR_COOKIE: ${{ secrets.OY_CURATOR_COOKIE }}
          OY_REFRESH_COOKIE: ${{ secrets.OY_REFRESH_COOKIE }}
          OY_SESSION_ID: ${{ secrets.OY_SESSION_ID }}
          OY_LINKAGE_STRING: ${{ secrets.OY_LINKAGE_STRING }}
          OY_LINKAGE_JWT: ${{ secrets.OY_LINKAGE_JWT }}
          OLIVEYOUNG_LINKAGE_STRING: ${{ secrets.OLIVEYOUNG_LINKAGE_STRING }}
          OLIVEYOUNG_LINKAGE_JWT: ${{ secrets.OLIVEYOUNG_LINKAGE_JWT }}
          OLIVEYOUNG_AFFILIATE_REGISTER_ID: ${{ secrets.OLIVEYOUNG_AFFILIATE_REGISTER_ID }}
        run: node scripts/generate-curator-links.mjs

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "📦 $(TZ=Asia/Seoul date +%m/%d\ %H:%M)"
          git push
