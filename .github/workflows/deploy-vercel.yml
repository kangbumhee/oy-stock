name: Deploy Vercel Production

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: vercel-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger one production deployment
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK is not configured"
            exit 1
          fi
          curl --fail --silent --show-error --request POST "$VERCEL_DEPLOY_HOOK"
