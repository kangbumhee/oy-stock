name: Deploy Vercel Production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_kCYpXTZeNpSxqcelRRUUSUKy
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Vercel credentials
        run: |
          if [ -z "$VERCEL_PROJECT_ID" ] || [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_PROJECT_ID or VERCEL_TOKEN is not configured"
            exit 1
          fi

      - name: Pull production settings
        run: npx --yes vercel@50.32.5 pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production bundle
        run: npx --yes vercel@50.32.5 build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production bundle
        run: npx --yes vercel@50.32.5 deploy --prebuilt --prod --token="$VERCEL_TOKEN"
