# 수동 실행 시 linkageString → JWT 검증 후 Vercel PATCH → Deploy Hook으로 재배포.
name: Refresh OliveYoung linkageString

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Refresh Vercel env
        env:
          OY_REFRESH_COOKIE: ${{ secrets.OY_REFRESH_COOKIE }}
          OY_CURATOR_COOKIE: ${{ secrets.OY_CURATOR_COOKIE }}
          OY_SESSION_ID: ${{ secrets.OY_SESSION_ID }}
          OY_LINKAGE_STRING: ${{ secrets.OY_LINKAGE_STRING }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: node scripts/refresh-oy-linkage.mjs
