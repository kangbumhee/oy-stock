name: Generate Curator Link On Demand

on:
  workflow_dispatch:
    inputs:
      goodsNos:
        description: 'Comma or whitespace separated OliveYoung goods numbers'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: curator-link-on-demand-main
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sparse-checkout: |
            package.json
            package-lock.json
            scripts
            public/data
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      - run: npx playwright install chromium --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Generate requested curator links
        env:
          CURATOR_GOODS_NOS: ${{ inputs.goodsNos }}
          CURATOR_MAX_GOODS: 120
          CURATOR_INCLUDE_LIVE_RANKING: 0
          OY_CURATOR_COOKIE: ${{ secrets.OY_CURATOR_COOKIE }}
          OY_REFRESH_COOKIE: ${{ secrets.OY_REFRESH_COOKIE }}
          OY_SESSION_ID: ${{ secrets.OY_SESSION_ID }}
          OY_LINKAGE_STRING: ${{ secrets.OY_LINKAGE_STRING }}
          OY_LINKAGE_JWT: ${{ secrets.OY_LINKAGE_JWT }}
          OLIVEYOUNG_LINKAGE_STRING: ${{ secrets.OLIVEYOUNG_LINKAGE_STRING }}
          OLIVEYOUNG_LINKAGE_JWT: ${{ secrets.OLIVEYOUNG_LINKAGE_JWT }}
          OLIVEYOUNG_AFFILIATE_REGISTER_ID: ${{ secrets.OLIVEYOUNG_AFFILIATE_REGISTER_ID }}
        run: node scripts/generate-curator-links.mjs

      - name: Commit & Push
        env:
          CURATOR_GOODS_NOS: ${{ inputs.goodsNos }}
        run: |
          cp public/data/curator-links.json /tmp/generated-curator-links.json
          git fetch origin main
          git reset --hard origin/main
          node scripts/merge-curator-links.mjs /tmp/generated-curator-links.json public/data/curator-links.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/curator-links.json
          git diff --staged --quiet || git commit -m "🔗 curator link $(TZ=Asia/Seoul date +%m/%d\ %H:%M)"
          git push
